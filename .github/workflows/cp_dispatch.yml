name: Custom Version - Workflow Dispatch

on:
  workflow_dispatch:
    inputs:
      version_to_patch:
        description: 'The Version You Want to Patch'
        required: true
        default: '7.7.2'
      os-and-arch:
        description: 'Operating System And Architecture'
        required: true
        type: choice
        options:
          - Windows (x86_64)
          - Linux (x86_64)
          - Mac (arm64)
      patch-server-port:
        description: 'Patch server port (useful for resolving port conflicts)'
        required: true
        default: '5678'
      patch-user-email:
        description: 'Fake registered email (for fake FE account)'
        required: true
        default: 'long@telerik.com'
      patch-user-firstName:
        description: 'Fake registered first name (for fake FE account)'
        required: true
        default: 'Long'
      patch-user-lastName:
        description: 'Fake registered last name (for fake FE account)'
        required: true
        default: 'Wang'
      patch-user-country-code:
        description: 'Fake registered country code (for fake FE account) ; Ex: 86'
        required: true
        default: '86'
      patch-user-provider:
        description: 'Fake registered provider (for fake FE account) ; Ex: Google'
        required: true
        default: 'Google'
      patch-language:
        description: 'Enable Chinese UI'
        required: true
        type: choice
        default: 'No'
        options:
          - 'No'
          - 'Yes (Ctrl+T to toggle)'

defaults:
  run:
    shell: pwsh

env:
  OS_ARCH: ${{ github.event.inputs.os-and-arch }}
  VERSION_TO_PATCH: ${{ github.event.inputs.version_to_patch }}
  PATCH_SERVER_PORT: ${{ github.event.inputs.patch-server-port }}
  PATCH_USER_EMAIL: ${{ github.event.inputs.patch-user-email }}
  PATCH_USER_FNAME: ${{ github.event.inputs.patch-user-firstName }}
  PATCH_USER_LNAME: ${{ github.event.inputs.patch-user-lastName }}
  PATCH_USER_COUNTRYCODE: ${{ github.event.inputs.patch-user-country-code }}
  PATCH_USER_PROVIDER: ${{ github.event.inputs.patch-user-provider }}
  PATCH_LANGUAGE: ${{ github.event.inputs.patch-language }}

jobs:

  validate-version:
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.get_validity.outputs.is_valid }}

    steps:
      - uses: actions/checkout@v6

      - name: Validate Fiddler Version
        id: get_validity
        working-directory: utils/fe-version-validator
        run: |
          ./Validate-FEVersion.ps1 -VersionToPatch $env:VERSION_TO_PATCH

  init_os_arch:
    runs-on: ubuntu-latest
    outputs:
      library_extension: ${{ steps.set_library_extension.outputs.library_extension }}
      arch_code: ${{ steps.set_arch.outputs.arch_code }}

    steps:
      - name: Set Library Extension (dll / so / dylib)
        id: set_library_extension
        run: |
          $extension = 'not-selected'
          if ($env:OS_ARCH -eq 'Windows (x86_64)') { $extension = 'dll' }
          elseif ($env:OS_ARCH -eq 'Linux (x86_64)') { $extension = 'so' }
          elseif ($env:OS_ARCH -match '^Mac ') { $extension = 'dylib' }
          else { throw "Unsupported OS architecture: $env:OS_ARCH" }
          "library_extension=$extension" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Set Arch Code
        id: set_arch
        run: |
          $arch = switch ($env:OS_ARCH) {
            'Windows (x86_64)' { 'win32-x86_64' }
            'Linux (x86_64)' { 'linux-x86_64' }
            'Mac (arm64)' { 'mac-arm64' }
            'Mac (arm64e)' { 'mac-arm64e' }
            'Mac (x86_64)' { 'mac-x86_64' }
            default { throw "Unsupported OS architecture: $env:OS_ARCH" }
          }
          "arch_code=$arch" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

  download-Yui-patch:
    runs-on: ubuntu-latest
    needs: [validate-version, init_os_arch]
    if: ${{ needs.validate-version.outputs.is_valid == 'true' }}

    env:
      LIBRARY_EXTENSION: ${{ needs.init_os_arch.outputs.library_extension }}
      ARCH_CODE: ${{ needs.init_os_arch.outputs.arch_code }}

    outputs:
      Yui-fiddler-name: ${{ steps.Yui-fiddler-name.outputs.Yui-fiddler-name }}

    steps:
      - name: Compare VERSION_TO_PATCH with 5.17.0
        run: |
          if ([version]$env:VERSION_TO_PATCH -ge [version]"5.17.0") {
            echo "IS_COMPATIBLE_CONT=true" >> $env:GITHUB_ENV
          } else {
            echo "IS_COMPATIBLE_CONT=false" >> $env:GITHUB_ENV
          }

      - name: Set Yui fiddler name
        id: Yui-fiddler-name
        run: |
          echo "YUI_NAME=yui" >> $env:GITHUB_ENV
          echo "Yui_RELEASE=continuous" >> $env:GITHUB_ENV
          if ($env:IS_COMPATIBLE_CONT -eq 'true' -and $env:OS_ARCH -ne 'Linux (x86_64)') {
            echo "Yui_FIDDLER_NAME=fiddler.$env:LIBRARY_EXTENSION" >> $env:GITHUB_ENV
            echo "Yui_FIDDLER_NAME_NO_EXTENSION=fiddler" >> $env:GITHUB_ENV
          } else {
            echo "Yui_FIDDLER_NAME=libfiddler.$env:LIBRARY_EXTENSION" >> $env:GITHUB_ENV
            echo "Yui_FIDDLER_NAME_NO_EXTENSION=libfiddler" >> $env:GITHUB_ENV
          }
          echo "Yui-fiddler-name=$env:Yui_FIDDLER_NAME" >> $env:GITHUB_OUTPUT

      - name: Download Yui Patch
        run: |
          New-Item -ItemType Directory -Path Yui -Force | Out-Null
          $url = "https://github.com/project-yui/Yui-patch/releases/download/$env:Yui_RELEASE/$env:YUI_NAME-$env:Yui_FIDDLER_NAME_NO_EXTENSION-$env:ARCH_CODE-$env:Yui_RELEASE.$env:LIBRARY_EXTENSION"
          Write-Host $url
          Invoke-WebRequest -Uri $url -OutFile "Yui\$env:Yui_FIDDLER_NAME" -UseBasicParsing

      - name: Upload Yui folder
        uses: actions/upload-artifact@v4
        with:
          name: Yui-patch
          path: Yui/
          compression-level: 9
          if-no-files-found: error

  download-msojocs-server:
    runs-on: ubuntu-latest
    needs: validate-version
    if: ${{ needs.validate-version.outputs.is_valid == 'true' }}

    steps:
      - name: Sparse checkout server
        run: |
          git init
          git remote add origin https://github.com/msojocs/fiddler-everywhere-enhance.git
          git config core.sparseCheckout true
          Set-Content -Path ".git/info/sparse-checkout" -Value "server"
          git pull origin main
          New-Item -ItemType Directory -Path msojocs -Force | Out-Null
          Move-Item -Path server -Destination msojocs/

      - name: Upload msojocs
        uses: actions/upload-artifact@v4
        with:
          name: msojocs-patch
          path: msojocs/
          compression-level: 9
          if-no-files-found: error

  download-fiddler-everywhere-windows:
    if: |
      needs.validate-version.outputs.is_valid == 'true' &&
      github.event.inputs.os-and-arch == 'Windows (x86_64)'
    runs-on: ubuntu-latest
    needs: [validate-version]

    steps:
      - name: Download & extract
        run: |
          $v = $env:VERSION_TO_PATCH
          Invoke-WebRequest -Uri "https://downloads.getfiddler.com/win/Fiddler%20Everywhere%20$v.exe" -OutFile setup.exe -UseBasicParsing
          7z x setup.exe -ofe_extracted
          7z x "fe_extracted/`$PLUGINSDIR/app-64.7z" -ofe_app

      - name: Upload fe_app
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/
          compression-level: 9
          if-no-files-found: error

  download-fiddler-everywhere-linux:
    if: |
      needs.validate-version.outputs.is_valid == 'true' &&
      github.event.inputs.os-and-arch == 'Linux (x86_64)'
    runs-on: ubuntu-latest
    needs: [validate-version]

    steps:
      - name: Download & extract
        run: |
          $v = $env:VERSION_TO_PATCH
          Invoke-WebRequest -Uri "https://downloads.getfiddler.com/linux/fiddler-everywhere-$v.AppImage" -OutFile setup.AppImage -UseBasicParsing
          chmod +x ./setup.AppImage
          ./setup.AppImage --appimage-extract
          mv squashfs-root fe_app

      - name: Upload fe_app
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/
          compression-level: 9
          if-no-files-found: error

  download-fiddler-everywhere-mac:
    if: |
      needs.validate-version.outputs.is_valid == 'true' &&
      (github.event.inputs.os-and-arch == 'Mac (arm64)' ||
       github.event.inputs.os-and-arch == 'Mac (x86_64)' ||
       github.event.inputs.os-and-arch == 'Mac (arm64e)')
    runs-on: macos-latest
    needs: [validate-version]

    steps:
      - name: Download DMG
        run: |
          $v = $env:VERSION_TO_PATCH
          $url = switch ($env:OS_ARCH) {
            'Mac (arm64)' { "https://downloads.getfiddler.com/mac-arm64/Fiddler%20Everywhere%20$v.dmg" }
            'Mac (x86_64)' { "https://downloads.getfiddler.com/mac/Fiddler%20Everywhere%20$v.dmg" }
            default { throw "Unsupported: $env:OS_ARCH" }
          }
          Invoke-WebRequest -Uri $url -OutFile FiddlerEverywhereSetup.dmg -UseBasicParsing
          if ((Get-Item FiddlerEverywhereSetup.dmg).Length -lt 1MB) { throw "DMG too small" }

      - name: Extract Dmg
        shell: bash
        run: |
          set -euo pipefail
          xattr -dr com.apple.quarantine FiddlerEverywhereSetup.dmg 2>/dev/null || true
          MOUNT_DIR="/tmp/fe-dmg-$$"
          mkdir -p "$MOUNT_DIR" fe_app
          if hdiutil attach -plist -nobrowse -noverify -noautofsck -noautoopen -mountpoint "$MOUNT_DIR" FiddlerEverywhereSetup.dmg; then
            cp -R "$MOUNT_DIR"/*.app fe_app/
            hdiutil detach "$MOUNT_DIR" -force
          else
            7z x FiddlerEverywhereSetup.dmg -o/tmp/fe-extract
            APP=$(find /tmp/fe-extract -name "*.app" -type d | head -1)
            cp -R "$APP" fe_app/
          fi

      - name: Upload fe_app
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/
          compression-level: 9
          if-no-files-found: error

  patch_fe:
    if: |
      always() && !cancelled() &&
      needs.validate-version.outputs.is_valid == 'true' &&
      (github.event.inputs.os-and-arch == 'Windows (x86_64)' ||
       github.event.inputs.os-and-arch == 'Linux (x86_64)')
    runs-on: windows-latest
    needs:
      - download-Yui-patch
      - download-msojocs-server
      - validate-version
      - download-fiddler-everywhere-windows
      - download-fiddler-everywhere-linux
      - download-fiddler-everywhere-mac

    steps:
      - uses: actions/download-artifact@v4
        with: { name: Yui-patch, path: Yui-patch }
      - uses: actions/download-artifact@v4
        with: { name: msojocs-patch, path: msojocs-patch }
      - uses: actions/download-artifact@v4
        with: { name: fe_app, path: fe_app }

      - name: Patch (Win/Linux)
        run: |
          Rename-Item fe_app FE
          $fn = "${{ needs.download-Yui-patch.outputs.Yui-fiddler-name }}"
          $dst = Get-ChildItem FE -Recurse -Filter $fn -File | Select-Object -First 1
          if (-not $dst) { $dst = Get-Item "FE/$fn" -ErrorAction SilentlyContinue }
          Copy-Item "Yui-patch/$fn" $dst.FullName -Force
          Copy-Item msojocs-patch/server/file FE/resources/app/out -Recurse -Force
          $idx = Get-Content msojocs-patch/server/index.js -Raw
          $idx = $idx -replace 'const port = \d+;', "const port = $env:PATCH_SERVER_PORT;"
          Set-Content msojocs-patch/server/index.js $idx
          $json = Get-Content FE/resources/app/out/file/identity.getfiddler.com/oauth/token.json -Raw | ConvertFrom-Json
          $json.user_info.email = $env:PATCH_USER_EMAIL
          $json.user_info.firstName = $env:PATCH_USER_FNAME
          $json.user_info.lastName = $env:PATCH_USER_LNAME
          $json.user_info.country = $env:PATCH_USER_COUNTRYCODE
          $json.user_info.identities[0].providerName = $env:PATCH_USER_PROVIDER
          $json | ConvertTo-Json -Depth 5 | Set-Content FE/resources/app/out/file/identity.getfiddler.com/oauth/token.json
          Copy-Item FE/resources/app/out/main.js FE/resources/app/out/main.original.js
          $main = Get-Content FE/resources/app/out/main.js -Raw
          Set-Content FE/resources/app/out/main.js ($idx + $main)
          if ($env:PATCH_LANGUAGE -like 'Yes*') {
            Copy-Item msojocs-patch/server/translate.js FE/resources/app/out/translate.js -Force
          }

      - name: Create compressed zip
        id: pkg
        run: |
          $zip = "FE-$($env:VERSION_TO_PATCH)-win.zip"
          Compress-Archive -Path FE -DestinationPath $zip -CompressionLevel Optimal -Force
          $mb = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "ZIP size: $mb MB"
          "zip_file=$zip" | Out-File -Append $env:GITHUB_OUTPUT
          "artifact_name=FE-$($env:VERSION_TO_PATCH)-win" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Upload compressed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact_name }}
          path: ${{ steps.pkg.outputs.zip_file }}
          compression-level: 9
          if-no-files-found: error

  patch_fe_mac:
    if: |
      always() && !cancelled() &&
      needs.validate-version.outputs.is_valid == 'true' &&
      (github.event.inputs.os-and-arch == 'Mac (arm64)' ||
       github.event.inputs.os-and-arch == 'Mac (x86_64)' ||
       github.event.inputs.os-and-arch == 'Mac (arm64e)')
    runs-on: macos-latest
    needs:
      - download-Yui-patch
      - download-msojocs-server
      - validate-version
      - download-fiddler-everywhere-windows
      - download-fiddler-everywhere-linux
      - download-fiddler-everywhere-mac

    steps:
      - uses: actions/download-artifact@v4
        with: { name: Yui-patch, path: Yui-patch }
      - uses: actions/download-artifact@v4
        with: { name: msojocs-patch, path: msojocs-patch }
      - uses: actions/download-artifact@v4
        with: { name: fe_app, path: fe_app }

      - name: Resolve Mac paths
        id: mac_paths
        run: |
          Rename-Item fe_app FE
          $app = Get-ChildItem FE -Filter "*.app" -Directory -Recurse | Select-Object -First 1
          $fw = Join-Path $app.FullName "Contents/Frameworks"
          $out = Join-Path $app.FullName "Contents/Resources/app/out"
          if (-not (Test-Path $out)) { throw "app/out not found" }
          "app=$($app.FullName)" | Out-File -Append $env:GITHUB_OUTPUT
          "fw=$fw" | Out-File -Append $env:GITHUB_OUTPUT
          "out=$out" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Patch dylib in Frameworks
        run: |
          $fw = "${{ steps.mac_paths.outputs.fw }}"
          $yui = Join-Path "Yui-patch" "${{ needs.download-Yui-patch.outputs.Yui-fiddler-name }}"
          $names = if ([version]$env:VERSION_TO_PATCH -ge [version]"5.17.0") { @("fiddler.dylib","libfiddler.dylib") } else { @("libfiddler.dylib","fiddler.dylib") }
          foreach ($n in $names) { Remove-Item (Join-Path $fw $n) -Force -ErrorAction SilentlyContinue }
          $dest = Join-Path $fw $names[0]
          Copy-Item $yui $dest -Force
          Write-Host "Installed: $dest ($((Get-Item $dest).Length) bytes)"

      - name: Patch app/out
        run: |
          $out = "${{ steps.mac_paths.outputs.out }}"
          Copy-Item msojocs-patch/server/file $out -Recurse -Force
          $idx = Get-Content msojocs-patch/server/index.js -Raw
          $idx = $idx -replace 'const port = \d+;', "const port = $env:PATCH_SERVER_PORT;"
          Set-Content msojocs-patch/server/index.js $idx
          $json = Get-Content "$out/file/identity.getfiddler.com/oauth/token.json" -Raw | ConvertFrom-Json
          $json.user_info.email = $env:PATCH_USER_EMAIL
          $json.user_info.firstName = $env:PATCH_USER_FNAME
          $json.user_info.lastName = $env:PATCH_USER_LNAME
          $json.user_info.country = $env:PATCH_USER_COUNTRYCODE
          $json.user_info.identities[0].providerName = $env:PATCH_USER_PROVIDER
          $json | ConvertTo-Json -Depth 5 | Set-Content "$out/file/identity.getfiddler.com/oauth/token.json"
          Copy-Item "$out/main.js" "$out/main.original.js"
          $main = Get-Content "$out/main.js" -Raw
          Set-Content "$out/main.js" ($idx + $main)
          if ($env:PATCH_LANGUAGE -like 'Yes*') {
            Copy-Item msojocs-patch/server/translate.js "$out/translate.js" -Force
          }

      - name: Re-sign app
        shell: bash
        run: codesign -s "-" --deep --force --verbose "${{ steps.mac_paths.outputs.app }}"

      - name: Create compressed zip (app only)
        id: pkg
        shell: bash
        run: |
          APP="${{ steps.mac_paths.outputs.app }}"
          VER="${{ env.VERSION_TO_PATCH }}"
          ARCH="arm64"
          [[ "${{ github.event.inputs.os-and-arch }}" == "Mac (x86_64)" ]] && ARCH="x64"
          ZIP="FE-${VER}-mac-${ARCH}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          ls -lh "$ZIP"
          echo "zip_file=$ZIP" >> "$GITHUB_OUTPUT"
          echo "artifact_name=FE-${VER}-mac-${ARCH}" >> "$GITHUB_OUTPUT"

      - name: Upload compressed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact_name }}
          path: ${{ steps.pkg.outputs.zip_file }}
          compression-level: 9
          if-no-files-found: error

      - name: Print download hint
        run: |
          Write-Host "=========================================="
          Write-Host "Artifact name: FE-$($env:VERSION_TO_PATCH)-mac-arm64"
          Write-Host "Download from Actions run Artifacts section"
          Write-Host "=========================================="
