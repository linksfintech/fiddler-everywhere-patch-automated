name: Custom Version - Workflow Dispatch

on:
  workflow_dispatch:
    inputs:
      version_to_patch:
        description: 'The Version You Want to Patch'
        required: true
        default: '7.7.3'
      os-and-arch:
        description: 'Operating System And Architecture'
        required: true
        type: choice
        options:
          - Windows (x86_64)
          - Linux (x86_64)
          - Mac (arm64)
      patch-server-port:
        description: 'Patch server port (useful for resolving port conflicts)'
        required: true
        default: '5678'
      patch-user-email:
        description: 'Fake registered email (for fake FE account)'
        required: true
        default: 'long@telerik.com'
      patch-user-firstName:
        description: 'Fake registered first name (for fake FE account)'
        required: true
        default: 'Long'
      patch-user-lastName:
        description: 'Fake registered last name (for fake FE account)'
        required: true
        default: 'Wang'
      patch-user-country-code:
        description: 'Fake registered country code (for fake FE account) ; Ex: 86'
        required: true
        default: '86'
      patch-user-provider:
        description: 'Fake registered provider (for fake FE account) ; Ex: Google'
        required: true
        default: 'Google'
      patch-language:
        description: 'Enable Chinese UI'
        required: true
        type: choice
        default: 'No'
        options:
          - 'No'
          - 'Yes (Ctrl+T to toggle)'

defaults:
  run:
    shell: pwsh

env:
  OS_ARCH: ${{ github.event.inputs.os-and-arch }}
  VERSION_TO_PATCH: ${{ github.event.inputs.version_to_patch }}
  PATCH_SERVER_PORT: ${{ github.event.inputs.patch-server-port }}
  PATCH_USER_EMAIL: ${{ github.event.inputs.patch-user-email }}
  PATCH_USER_FNAME: ${{ github.event.inputs.patch-user-firstName }}
  PATCH_USER_LNAME: ${{ github.event.inputs.patch-user-lastName }}
  PATCH_USER_COUNTRYCODE: ${{ github.event.inputs.patch-user-country-code }}
  PATCH_USER_PROVIDER: ${{ github.event.inputs.patch-user-provider }}
  PATCH_LANGUAGE: ${{ github.event.inputs.patch-language }}

jobs:

  validate-version:
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.get_validity.outputs.is_valid }}

    steps:
      - uses: actions/checkout@v6

      - name: Validate Fiddler Version
        id: get_validity
        working-directory: utils/fe-version-validator
        run: |
          ./Validate-FEVersion.ps1 -VersionToPatch $env:VERSION_TO_PATCH

  init_os_arch:
    runs-on: ubuntu-latest
    outputs:
      library_extension: ${{ steps.set_library_extension.outputs.library_extension }}
      arch_code: ${{ steps.set_arch.outputs.arch_code }}
      mac_dylib_dest_name: ${{ steps.set_mac_dylib_dest.outputs.mac_dylib_dest_name }}

    steps:
      - name: Set Library Extension
        id: set_library_extension
        run: |
          $extension = switch ($env:OS_ARCH) {
            'Windows (x86_64)' { 'dll' }
            'Linux (x86_64)' { 'so' }
            { $_ -match '^Mac ' } { 'dylib' }
            default { throw "Unsupported OS architecture: $env:OS_ARCH" }
          }
          "library_extension=$extension" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Set Arch Code
        id: set_arch
        run: |
          $arch = switch ($env:OS_ARCH) {
            'Windows (x86_64)' { 'win32-x86_64' }
            'Linux (x86_64)' { 'linux-x86_64' }
            'Mac (arm64)' { 'mac-arm64' }
            'Mac (arm64e)' { 'mac-arm64e' }
            'Mac (x86_64)' { 'mac-x86_64' }
            default { throw "Unsupported OS architecture: $env:OS_ARCH" }
          }
          "arch_code=$arch" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Set Mac install dylib name
        id: set_mac_dylib_dest
        run: |
          "mac_dylib_dest_name=libfiddler.dylib" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

  download-Yui-patch:
    runs-on: ubuntu-latest
    needs: [validate-version, init_os_arch]
    if: needs.validate-version.outputs.is_valid == 'true'

    env:
      LIBRARY_EXTENSION: ${{ needs.init_os_arch.outputs.library_extension }}
      ARCH_CODE: ${{ needs.init_os_arch.outputs.arch_code }}

    outputs:
      Yui-fiddler-name: ${{ steps.set_yui.outputs.Yui-fiddler-name }}

    steps:
      - name: Set Yui download filename
        id: set_yui
        run: |
          $ext = "${{ needs.init_os_arch.outputs.library_extension }}"

          if ([version]$env:VERSION_TO_PATCH -ge [version]"5.17.0" -and $env:OS_ARCH -ne 'Linux (x86_64)') {
            $yuiName = "fiddler.$ext"
            $noExt = "fiddler"
          } else {
            $yuiName = "libfiddler.$ext"
            $noExt = "libfiddler"
          }

          "YUI_NAME=yui" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "Yui_RELEASE=continuous" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "Yui_FIDDLER_NAME=$yuiName" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "Yui_FIDDLER_NAME_NO_EXTENSION=$noExt" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "Yui-fiddler-name=$yuiName" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

          Write-Host "Yui download file: $yuiName"
          Write-Host "Mac install target: libfiddler.dylib"

      - name: Download Yui Patch
        run: |
          New-Item -ItemType Directory -Path Yui -Force | Out-Null
          $url = "https://github.com/project-yui/Yui-patch/releases/download/$env:Yui_RELEASE/$env:YUI_NAME-$env:Yui_FIDDLER_NAME_NO_EXTENSION-$env:ARCH_CODE-$env:Yui_RELEASE.$env:LIBRARY_EXTENSION"
          Write-Host "URL: $url"
          Invoke-WebRequest -Uri $url -OutFile "Yui\$env:Yui_FIDDLER_NAME" -UseBasicParsing
          $item = Get-Item "Yui\$env:Yui_FIDDLER_NAME"
          if ($item.PSIsContainer) { throw "Downloaded Yui patch is a directory" }
          Write-Host "Downloaded $($item.Length) bytes"

      - name: Upload Yui-patch
        uses: actions/upload-artifact@v4
        with:
          name: Yui-patch
          path: Yui/
          compression-level: 9
          retention-days: 3
          if-no-files-found: error

  download-msojocs-server:
    runs-on: ubuntu-latest
    needs: [validate-version]
    if: needs.validate-version.outputs.is_valid == 'true'

    steps:
      - name: Sparse checkout server
        run: |
          git init
          git remote add origin https://github.com/msojocs/fiddler-everywhere-enhance.git
          git config core.sparseCheckout true
          Set-Content -Path ".git/info/sparse-checkout" -Value "server"
          git pull origin main
          New-Item -ItemType Directory -Path msojocs -Force | Out-Null
          Move-Item -Path server -Destination msojocs/

      - name: Upload msojocs-patch
        uses: actions/upload-artifact@v4
        with:
          name: msojocs-patch
          path: msojocs/
          compression-level: 9
          retention-days: 3
          if-no-files-found: error

  download-fiddler-everywhere-windows:
    if: |
      needs.validate-version.outputs.is_valid == 'true' &&
      github.event.inputs.os-and-arch == 'Windows (x86_64)'
    runs-on: ubuntu-latest
    needs: [validate-version]

    steps:
      - name: Download & extract
        run: |
          $v = $env:VERSION_TO_PATCH
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://downloads.getfiddler.com/win/Fiddler%20Everywhere%20$v.exe" -OutFile setup.exe -UseBasicParsing
          7z x setup.exe -ofe_extracted
          7z x "fe_extracted/`$PLUGINSDIR/app-64.7z" -ofe_app

      - name: Upload fe_app
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/
          compression-level: 9
          retention-days: 3
          if-no-files-found: error

  download-fiddler-everywhere-linux:
    if: |
      needs.validate-version.outputs.is_valid == 'true' &&
      github.event.inputs.os-and-arch == 'Linux (x86_64)'
    runs-on: ubuntu-latest
    needs: [validate-version]

    steps:
      - name: Download & extract
        run: |
          $v = $env:VERSION_TO_PATCH
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://downloads.getfiddler.com/linux/fiddler-everywhere-$v.AppImage" -OutFile setup.AppImage -UseBasicParsing
          chmod +x ./setup.AppImage
          ./setup.AppImage --appimage-extract
          mv squashfs-root fe_app

      - name: Upload fe_app
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/
          compression-level: 9
          retention-days: 3
          if-no-files-found: error

  # Mac: build-patch-mac = 原 download-fiddler-everywhere-mac + patch_fe_mac 合并为同一 job。
  # 原因：fe_app 经 upload/download artifact 会破坏 .framework 符号链接（Electron 变 ASCII 文本）。
  # 顺序：下载 DMG → ditto 解压 → 校验 → 打补丁 → 打包（均在同一 runner 内完成）。
  build-patch-mac:
    needs:
      - validate-version
      - init_os_arch
      - download-Yui-patch
      - download-msojocs-server
    if: |
      needs.validate-version.outputs.is_valid == 'true' &&
      needs.download-Yui-patch.result == 'success' &&
      needs.download-msojocs-server.result == 'success' &&
      (github.event.inputs.os-and-arch == 'Mac (arm64)' ||
       github.event.inputs.os-and-arch == 'Mac (x86_64)' ||
       github.event.inputs.os-and-arch == 'Mac (arm64e)')
    runs-on: macos-latest

    env:
      MAC_DYLIB_DEST: ${{ needs.init_os_arch.outputs.mac_dylib_dest_name }}

    steps:
      - uses: actions/download-artifact@v4
        with: { name: Yui-patch, path: Yui-patch }
      - uses: actions/download-artifact@v4
        with: { name: msojocs-patch, path: msojocs-patch }

      - name: Download DMG
        run: |
          $v = $env:VERSION_TO_PATCH
          $url = switch ($env:OS_ARCH) {
            'Mac (arm64)' { "https://downloads.getfiddler.com/mac-arm64/Fiddler%20Everywhere%20$v.dmg" }
            'Mac (x86_64)' { "https://downloads.getfiddler.com/mac/Fiddler%20Everywhere%20$v.dmg" }
            'Mac (arm64e)' { throw "Mac (arm64e) is not supported yet." }
            default { throw "Unsupported: $env:OS_ARCH" }
          }
          Write-Host "URL: $url"
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $url -OutFile FiddlerEverywhereSetup.dmg -UseBasicParsing
          if ((Get-Item FiddlerEverywhereSetup.dmg).Length -lt 1000000) { throw "DMG too small" }

      - name: Extract Dmg (ditto — preserves framework symlinks)
        shell: bash
        run: |
          set -euo pipefail
          xattr -dr com.apple.quarantine FiddlerEverywhereSetup.dmg 2>/dev/null || true
          rm -rf fe_app
          mkdir -p fe_app
          MOUNT_DIR="/tmp/fe-dmg-mount-$$"
          mkdir -p "$MOUNT_DIR"

          extract_with_ditto() {
            local src_app="$1"
            local name
            name=$(basename "$src_app")
            echo "ditto from: $src_app -> fe_app/$name"
            ditto "$src_app" "fe_app/$name"
          }

          if hdiutil attach -plist -nobrowse -noverify -noautofsck -noautoopen -mountpoint "$MOUNT_DIR" FiddlerEverywhereSetup.dmg; then
            SRC_APP=$(find "$MOUNT_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
            if [ -z "$SRC_APP" ]; then echo "No .app on DMG volume"; exit 1; fi
            extract_with_ditto "$SRC_APP"
            hdiutil detach "$MOUNT_DIR" -force
          else
            echo "hdiutil failed, trying 7z..."
            rm -rf /tmp/fe-dmg-extract
            7z x FiddlerEverywhereSetup.dmg -o/tmp/fe-dmg-extract
            SRC_APP=$(find /tmp/fe-dmg-extract -name "*.app" -type d | head -1)
            if [ -z "$SRC_APP" ]; then echo "No .app in 7z extract"; exit 1; fi
            extract_with_ditto "$SRC_APP"
          fi
          ls -la fe_app/

      - name: Repair framework symlinks
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find fe_app -name "*.app" -type d | head -1)
          [ -n "$APP" ] || { echo "No .app in fe_app"; exit 1; }

          repair_fw() {
            local FW="$1"
            [ -d "$FW" ] || return 0
            local VER
            if [ -L "$FW/Versions/Current" ] || [ -d "$FW/Versions/Current" ]; then
              VER=$(basename "$(readlink "$FW/Versions/Current" 2>/dev/null || echo Current)")
            elif [ -f "$FW/Versions/Current" ]; then
              VER=$(tr -d '\n\r' < "$FW/Versions/Current")
            else
              VER=$(ls "$FW/Versions" 2>/dev/null | grep -vE '^Current$' | head -1)
            fi
            [ -n "$VER" ] && [ -d "$FW/Versions/$VER" ] || { echo "Cannot find version dir in $FW"; return 1; }
            echo "Repair $FW -> Versions/$VER"
            rm -f "$FW/Versions/Current"
            ln -sf "$VER" "$FW/Versions/Current"
            rm -f "$FW/Electron Framework" "$FW/Libraries" "$FW/Resources"
            ln -sf "Versions/Current/Electron Framework" "$FW/Electron Framework"
            [ -d "$FW/Versions/$VER/Libraries" ] && ln -sf "Versions/Current/Libraries" "$FW/Libraries"
            [ -d "$FW/Versions/$VER/Resources" ] && ln -sf "Versions/Current/Resources" "$FW/Resources"
          }

          repair_fw "$APP/Contents/Frameworks/Electron Framework.framework"
          echo "Framework layout:"
          ls -la "$APP/Contents/Frameworks/Electron Framework.framework" || true
          ls -la "$APP/Contents/Frameworks/Electron Framework.framework/Versions" || true

      - name: Verify Electron before patch
        shell: bash
        run: |
          set -euo pipefail
          APP=$(find fe_app -name "*.app" -type d | head -1)
          FW="$APP/Contents/Frameworks/Electron Framework.framework"
          EF="$FW/Versions/Current/Electron Framework"
          if [ ! -f "$EF" ]; then
            VER=$(ls "$FW/Versions" | grep -vE '^Current$' | head -1)
            EF="$FW/Versions/$VER/Electron Framework"
          fi
          echo "Checking: $EF"
          file "$EF" | tee /dev/stderr | grep -q "Mach-O" || { echo "Electron invalid before patch"; exit 1; }
          echo "Electron OK before patch"

      - name: Resolve Mac app paths
        id: mac_paths
        run: |
          Rename-Item fe_app FE
          $app = Get-ChildItem FE -Filter "*.app" -Directory -Recurse | Select-Object -First 1
          if (-not $app) { throw "No .app found" }

          $fw = Join-Path $app.FullName "Contents/Frameworks"
          $out = Join-Path $app.FullName "Contents/Resources/app/out"
          $bin = Join-Path $app.FullName "Contents/MacOS/Fiddler Everywhere"

          if (-not (Test-Path $out)) { throw "Missing app/out" }
          if (-not (Test-Path $bin)) { throw "Missing MacOS binary" }

          Get-ChildItem $fw -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'fiddler' } |
            ForEach-Object { Write-Host "$($_.Name) ($(if ($_.PSIsContainer) {'dir'} else {'file'}))" }

          "app=$($app.FullName)" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "fw=$fw" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "out=$out" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "bin=$bin" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Patch libfiddler.dylib
        run: |
          $fw = "${{ steps.mac_paths.outputs.fw }}"
          $destName = $env:MAC_DYLIB_DEST
          $yuiName = "${{ needs.download-Yui-patch.outputs.Yui-fiddler-name }}"

          if ([string]::IsNullOrWhiteSpace($yuiName)) {
            $yuiItem = Get-ChildItem -Path "Yui-patch" -Recurse -File |
              Where-Object { $_.Extension -eq '.dylib' } | Select-Object -First 1
            if (-not $yuiItem) { throw "No .dylib in Yui-patch" }
            $yuiFile = $yuiItem.FullName
          } else {
            $yuiFile = Join-Path "Yui-patch" $yuiName
          }

          if (-not (Test-Path $yuiFile)) { throw "Yui not found: $yuiFile" }
          if ((Get-Item $yuiFile).PSIsContainer) { throw "Yui must be file" }

          foreach ($n in @("fiddler.dylib", "libfiddler.dylib")) {
            $p = Join-Path $fw $n
            if (Test-Path $p) { Remove-Item $p -Recurse -Force; Write-Host "Removed $p" }
          }

          $destPath = Join-Path $fw $destName
          Copy-Item -Path $yuiFile -Destination $destPath -Force
          $item = Get-Item $destPath
          if ($item.PSIsContainer) { throw "$destPath is directory" }
          Write-Host "Installed $($item.Length) bytes -> $destPath"

      - name: Patch app/out
        run: |
          $out = "${{ steps.mac_paths.outputs.out }}"
          Copy-Item msojocs-patch/server/file $out -Recurse -Force
          $idx = Get-Content msojocs-patch/server/index.js -Raw
          $idx = $idx -replace 'const port = \d+;', "const port = $env:PATCH_SERVER_PORT;"
          Set-Content msojocs-patch/server/index.js $idx
          $jp = "$out/file/identity.getfiddler.com/oauth/token.json"
          $j = Get-Content $jp -Raw | ConvertFrom-Json
          $j.user_info.email = $env:PATCH_USER_EMAIL
          $j.user_info.firstName = $env:PATCH_USER_FNAME
          $j.user_info.lastName = $env:PATCH_USER_LNAME
          $j.user_info.country = $env:PATCH_USER_COUNTRYCODE
          $j.user_info.identities[0].providerName = $env:PATCH_USER_PROVIDER
          $j | ConvertTo-Json -Depth 5 | Set-Content $jp
          Copy-Item "$out/main.js" "$out/main.original.js"
          $m = Get-Content "$out/main.js" -Raw
          Set-Content "$out/main.js" ($idx + $m)
          if ($env:PATCH_LANGUAGE -like 'Yes*') {
            Copy-Item msojocs-patch/server/translate.js "$out/translate.js" -Force
          }

      - name: Fix MacOS execute permission
        shell: bash
        run: |
          chmod +x "${{ steps.mac_paths.outputs.bin }}"
          chmod -R +x "$(dirname "${{ steps.mac_paths.outputs.bin }}")"

      - name: Re-sign app bundle
        shell: bash
        run: |
          set +e
          APP="${{ steps.mac_paths.outputs.app }}"
          DYLIB="$APP/Contents/Frameworks/libfiddler.dylib"
          if [ -f "$DYLIB" ]; then
            codesign --remove-signature "$DYLIB" 2>/dev/null || true
            codesign -s "-" -f "$DYLIB" || echo "WARN: dylib"
          fi
          codesign -s "-" -f "$APP/Contents/MacOS/Fiddler Everywhere" || echo "WARN: binary"
          codesign -s "-" --force --timestamp=none "$APP" || echo "WARN: app"
          exit 0

      - name: Verify Electron after patch
        shell: bash
        run: |
          set -euo pipefail
          APP="${{ steps.mac_paths.outputs.app }}"
          FW="$APP/Contents/Frameworks/Electron Framework.framework"
          EF="$FW/Versions/Current/Electron Framework"
          if [ ! -f "$EF" ]; then
            VER=$(ls "$FW/Versions" | grep -vE '^Current$' | head -1)
            EF="$FW/Versions/$VER/Electron Framework"
          fi
          file "$EF" | grep -q "Mach-O" || { echo "Electron invalid after patch"; file "$EF"; exit 1; }
          echo "Electron OK after patch"

      - name: Create zip (ditto)
        id: pkg
        shell: bash
        run: |
          APP="${{ steps.mac_paths.outputs.app }}"
          VER="${{ env.VERSION_TO_PATCH }}"
          ARCH="arm64"
          [[ "${{ github.event.inputs.os-and-arch }}" == "Mac (x86_64)" ]] && ARCH="x64"
          ZIP="FE-${VER}-mac-${ARCH}.zip"
          rm -f "$ZIP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          ls -lh "$ZIP"
          echo "zip_file=$ZIP" >> "$GITHUB_OUTPUT"
          echo "artifact_name=FE-${VER}-mac-${ARCH}" >> "$GITHUB_OUTPUT"

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact_name }}
          path: ${{ steps.pkg.outputs.zip_file }}
          compression-level: 9
          if-no-files-found: error

      - name: Install instructions
        run: |
          Write-Host "Download: FE-$($env:VERSION_TO_PATCH)-mac-arm64"
          Write-Host "Install: unzip -> ditto to /Applications -> xattr -cr -> open"

  patch_fe:
    needs:
      - validate-version
      - init_os_arch
      - download-Yui-patch
      - download-msojocs-server
      - download-fiddler-everywhere-windows
      - download-fiddler-everywhere-linux
    if: |
      needs.validate-version.outputs.is_valid == 'true' &&
      needs.download-Yui-patch.result == 'success' &&
      needs.download-msojocs-server.result == 'success' &&
      (
        (github.event.inputs.os-and-arch == 'Windows (x86_64)' &&
         needs.download-fiddler-everywhere-windows.result == 'success') ||
        (github.event.inputs.os-and-arch == 'Linux (x86_64)' &&
         needs.download-fiddler-everywhere-linux.result == 'success')
      )
    runs-on: windows-latest

    steps:
      - uses: actions/download-artifact@v4
        with: { name: Yui-patch, path: Yui-patch }
      - uses: actions/download-artifact@v4
        with: { name: msojocs-patch, path: msojocs-patch }
      - uses: actions/download-artifact@v4
        with: { name: fe_app, path: fe_app }

      - name: Patch Win/Linux
        run: |
          Rename-Item fe_app FE
          $yuiName = "${{ needs.download-Yui-patch.outputs.Yui-fiddler-name }}"
          if ([string]::IsNullOrWhiteSpace($yuiName)) {
            $yuiItem = Get-ChildItem Yui-patch -Recurse -File |
              Where-Object { $_.Extension -in '.dll', '.so' } | Select-Object -First 1
            if (-not $yuiItem) { throw "No Yui file" }
            $yuiPath = $yuiItem.FullName; $fn = $yuiItem.Name
          } else {
            $fn = $yuiName; $yuiPath = Join-Path Yui-patch $fn
          }
          $dst = Get-ChildItem FE -Recurse -Filter $fn -File | Select-Object -First 1
          if (-not $dst) { throw "Target $fn not found" }
          Copy-Item $yuiPath $dst.FullName -Force
          Copy-Item msojocs-patch/server/file FE/resources/app/out -Recurse -Force
          $idx = Get-Content msojocs-patch/server/index.js -Raw
          $idx = $idx -replace 'const port = \d+;', "const port = $env:PATCH_SERVER_PORT;"
          Set-Content msojocs-patch/server/index.js $idx
          $jp = "FE/resources/app/out/file/identity.getfiddler.com/oauth/token.json"
          $j = Get-Content $jp -Raw | ConvertFrom-Json
          $j.user_info.email = $env:PATCH_USER_EMAIL
          $j.user_info.firstName = $env:PATCH_USER_FNAME
          $j.user_info.lastName = $env:PATCH_USER_LNAME
          $j.user_info.country = $env:PATCH_USER_COUNTRYCODE
          $j.user_info.identities[0].providerName = $env:PATCH_USER_PROVIDER
          $j | ConvertTo-Json -Depth 5 | Set-Content $jp
          Copy-Item FE/resources/app/out/main.js FE/resources/app/out/main.original.js
          $m = Get-Content FE/resources/app/out/main.js -Raw
          Set-Content FE/resources/app/out/main.js ($idx + $m)
          if ($env:PATCH_LANGUAGE -like 'Yes*') {
            Copy-Item msojocs-patch/server/translate.js FE/resources/app/out/translate.js -Force
          }

      - name: Create zip
        id: pkg
        run: |
          $suffix = if ($env:OS_ARCH -eq 'Linux (x86_64)') { 'linux' } else { 'win' }
          $zip = "FE-$($env:VERSION_TO_PATCH)-$suffix.zip"
          Compress-Archive -Path FE -DestinationPath $zip -CompressionLevel Optimal -Force
          "zip_file=$zip" | Out-File -Append $env:GITHUB_OUTPUT -Encoding utf8
          "artifact_name=FE-$($env:VERSION_TO_PATCH)-$suffix" | Out-File -Append $env:GITHUB_OUTPUT -Encoding utf8

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact_name }}
          path: ${{ steps.pkg.outputs.zip_file }}
          compression-level: 9
          if-no-files-found: error
